<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B-612鍙峰畤瀹欐极娓告寚鍗?/title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Playfair+Display:wght@400;600&family=Lora:wght@400;600&family=Crimson+Text:ital@0;1&family=Noto+Serif+SC:wght@400;600&family=Caveat:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cormorant Garamond', 'Noto Serif SC', 'Georgia', 'Times New Roman', serif;
            background-color: #0a0f1a;
            color: #e0e6f0;
            line-height: 1.7;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }


		
		
        /* ===== 鍔ㄦ€佹槦绌鸿儗鏅?===== */
        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
            background: radial-gradient(ellipse at 30% 40%, #1a2a4a 0%, #0a0f1a 80%);
        }

        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px #fff;
            animation: twinkle var(--duration) infinite alternate;
        }
		
		
				.parchment-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="1" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.05"/></svg>');
    background-repeat: repeat;
    pointer-events: none;
    z-index: -1;
    opacity: 0.3;
    mix-blend-mode: multiply;
}
		<div class="parchment-overlay"></div>

        @keyframes twinkle {
    0% {
        opacity: var(--min-opacity);
        transform: scale(1);
        box-shadow: 0 0 2px #fff;
    }
    50% {
        opacity: 1;                      /* 鏈€浜偣瀹屽叏涓嶉€忔槑 */
        transform: scale(2);              /* 鏀惧ぇ鍒颁袱鍊?*/
        box-shadow: 0 0 25px #fff, 0 0 50px gold, 0 0 80px gold; /* 鏇村ぇ鍏夋檿 */
    }
    100% {
        opacity: var(--min-opacity);
        transform: scale(1);
        box-shadow: 0 0 2px #fff;
    }
}

        

        /* ===== 椤甸潰瀹瑰櫒 ===== */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 30px 20px 15px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease, visibility 0.8s;
            overflow-y: auto;
			-webkit-overflow-scrolling: touch; /* 馃憟 鍏抽敭锛氬惎鐢ㄥ脊鎬ф粴鍔?*/
			overscroll-behavior-y: contain;   /* 馃憟 闃叉婊氬姩绌块€忓埌鐖剁骇 */
            background: rgba(10, 15, 26, 0.3);
            backdrop-filter: blur(2px);
        }

        .page.active {
            opacity: 1;
            visibility: visible;
            z-index: 10;
        }


		.container {
    position: relative;
    max-width: 700px;
    margin: 0 auto;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 40px;
	background: rgba(40, 30, 20, 0.5);
    background-image: 
        radial-gradient(circle at 10% 15%, rgba(255, 220, 160, 0.2) 0%, transparent 35%),
        radial-gradient(circle at 90% 25%, rgba(210, 180, 255, 0.15) 0%, transparent 45%),
        radial-gradient(circle at 30% 75%, rgba(255, 200, 150, 0.18) 0%, transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(200, 230, 255, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 50% 40%, rgba(255, 220, 190, 0.1) 0%, transparent 60%),
        radial-gradient(circle at 80% 80%, rgba(240, 210, 180, 0.1) 0%, transparent 60%);
	
	animation: glowWave 10s infinite alternate ease-in-out;
	
	/* 鉁?瑕佹眰1锛氳嚜韬竟妗嗚涓洪€忔槑 */
    border: none;  
	
    
    /* 鉁?瑕佹眰2 & 3锛氱粺涓€ padding + 闃叉閲嶅彔 */
    padding: 20px 20px;  /* 鎵€鏈夎澶囩粺涓€浣跨敤姝ゅ€硷紙宸查獙璇佺Щ鍔ㄧ鍏煎锛?*/

    box-shadow: 
        0 20px 40px rgba(0,0,0,0.8),                /* 澶栨姇褰?*/
        0 0 0 1px rgba(210, 170, 120, 0.6),        /* 鍐呭眰缁嗛噾灞炵嚎 */
        0 0 0 2px rgba(150, 110, 70, 0.4),          /* 涓眰娣辫壊 */
        0 0 0 4px rgba(200, 160, 110, 0.2),         /* 澶栧眰娴呰壊 */
        inset 0 0 30px rgba(30, 20, 10, 0.8),       /* 鍐呴槾褰卞姞娣辫竟缂?*/
        inset 0 0 20px rgba(255, 215, 140, 0.2);     /* 鍐呭彂鍏?*/
    overflow: hidden;
}

/* 鍐呭鍖哄煙鐪熷疄 padding锛堥€氳繃 :first-child 涓?:last-child 鎺у埗锛?*/
.container > *:first-child {
    margin-top: 50px;
}
.container > *:last-child {
    margin-bottom: 150px;
}
.container > * {
    padding: 0 20px;
}

/* 浼厓绱犺竟妗嗭細鐢?transform 浠ｆ浛 top/bottom 璐熷€?*/
.container::before,
.container::after {
    content: '';
    position: absolute;
    left: 0;
    width: 100%;
    height: 50px;
    background-size: 100% 100%;
    background-repeat: no-repeat;
    pointer-events: none;
    z-index: 2;
    opacity: 0.9;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6)) drop-shadow(0 0 2px #b28b5e);
}

.container::before {
    top: 0;
    background-image: url('./assets/images/shangbianxian.png');
    transform: translateY(-1px);
	opacity: 0.9;
    filter: drop-shadow(0 -4px 6px rgba(0,0,0,0.6))  /* 鍚戜笂鎶曞奖锛堜笅杈规鐨勭珛浣撴劅锛?*/
            drop-shadow(0 0 2px #b28b5e)
            drop-shadow(0 0 5px #ffd966);
    -webkit-mask-image: linear-gradient(to top, transparent 0%, black 20%, black 80%, transparent 100%);
    mask-image: linear-gradient(to top, transparent 0%, black 20%, black 80%, transparent 100%);
}

.container::after {
    bottom: 0;
    background-image: url('./assets/images/xiabianxian.png');
    transform: translateY(7px);
	opacity: 0.9;
    filter: drop-shadow(0 -4px 6px rgba(0,0,0,0.6))  /* 鍚戜笂鎶曞奖锛堜笅杈规鐨勭珛浣撴劅锛?*/
            drop-shadow(0 0 2px #b28b5e)
            drop-shadow(0 0 5px #ffd966);
    -webkit-mask-image: linear-gradient(to top, transparent 0%, black 20%, black 80%, transparent 100%);
    mask-image: linear-gradient(to top, transparent 0%, black 20%, black 80%, transparent 100%);
}

/* 鍏夋檿娉㈠姩鍔ㄧ敾 */
@keyframes glowWave {
    0% {
        background-position: 0% 0%;
    }
    50% {
        background-position: 2% 3%;
    }
    100% {
        background-position: -2% -1%;
    }
}

		
		.page::after {
    content: "鈥斺€斺€?鉁?鏄熺┖鐨勫敖澶?鉁?鈥斺€斺€?;
    display: block;
    text-align: center;
    color: #b28b5e;
    font-size: 0.85rem;
    letter-spacing: 2px;
    margin-top: 25px;
    opacity: 0.7;
    font-style: italic;
    border-top: 1px dashed rgba(180, 140, 80, 0.4);
    padding-top: 15px;
}
		

.container::after {
    content: '鉁?;
    position: absolute;
    bottom: 10px;
    right: 20px;
    color: #b28b5e;
    font-size: 1.2rem;
    opacity: 0.5;
}

        /* 鏍囬 */
        .chapter-title {
		text-align: center !important;
    font-size: 2rem;
    margin-bottom: 15px;
    font-weight: 600;
    letter-spacing: 2px;
    text-shadow: 2px 2px 4px #3a2a1a, 0 0 10px #b8860b;
    background: linear-gradient(135deg, #f5e6b3, #ffd966, #d4af37);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
text-shadow: 0 0 15px #ffd966, 2px 2px 4px #3a2a1a;
   
    background-clip: text;
    position: relative;
    padding-bottom: 10px;
}
.chapter-title::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 25%;
    width: 50%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #d4af37, #b8860b, #d4af37, transparent);
}

        .chapter-subtitle {
            font-size: 1rem;
            color: #aab8d9;
            margin-bottom: 25px;
            font-style: italic;
            border-bottom: 1px dashed rgba(255,215,0,0.3);
            padding-bottom: 10px;
        }

        /* ===== 鍗＄墖鏍峰紡 ===== */
        .scene-card {
    background: rgba(30, 25, 20, 0.3);
	background-image: 
        radial-gradient(circle at 15% 20%, rgba(255, 210, 150, 0.2) 0%, transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(200, 190, 240, 0.15) 0%, transparent 45%),
        radial-gradient(circle at 40% 70%, rgba(230, 180, 130, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 70% 80%, rgba(170, 220, 240, 0.1) 0%, transparent 55%),
        radial-gradient(circle at 50% 40%, rgba(240, 200, 160, 0.1) 0%, transparent 60%);
    backdrop-filter: blur(8px);
	-webkit-backdrop-filter: blur(8px);
    border-radius: 32px;
    padding: 25px;
    margin-bottom: 25px;
    border:none;
	
    box-shadow: 
        0 10px 20px rgba(0,0,0,0.6),
        0 0 0 1px rgba(190, 150, 100, 0.5),
        0 0 0 2px rgba(130, 90, 60, 0.3),
        inset 0 0 20px rgba(20, 15, 10, 0.8),
        inset 0 0 15px rgba(255, 210, 150, 0.15);
    color: #f0e6d2;
    font-size: 1rem;
    line-height: 1.8;
}

.scene-card, .puzzle-area, .success-story,  {
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
}

/* 褰曢煶鏈烘牱寮?*/
.tape-recorder {
    background: linear-gradient(145deg, #3a3a3a, #1a1a1a);
    border: 3px solid #8b6b42;
    border-radius: 20px;
    padding: 20px;
    margin: 20px 0;
    color: #d4c9a6;
    font-family: 'Courier New', monospace;
    box-shadow: inset 0 0 20px #000, 0 10px 10px rgba(0,0,0,0.5);
    position: relative;
}
.tape-recorder::before {
    content: '馃敶';
    position: absolute;
    top: 5px;
    right: 10px;
    font-size: 1.2rem;
    animation: blink 1s infinite;
}

/* 渚跨 */
.sticky-note {
    background: #f7e9d7;
    border: 1px solid #b28b5e;
    border-radius: 5px 20px 5px 20px;
    padding: 15px;
    margin: 20px 0;
    color: #3a2a1a;
    font-family: 'Caveat', cursive;
    box-shadow: 5px 5px 10px rgba(0,0,0,0.3), inset 0 0 5px #fff8e7;
    transform: rotate(-1deg);
}

/* 妗屾父鍗＄墝鏍峰紡锛堝彲鐢ㄤ簬鐖卞ソ鏄熺悆锛?*/
.card-note {
    background: #f0e6d2;
    border: 3px solid #b28b5e;
    border-radius: 15px;
    padding: 20px;
    margin: 20px 0;
    color: #3a2a1a;
    box-shadow: 0 10px 0 #5e3e2b, 0 15px 20px #000;
    font-weight: bold;
}

/* 灏忕焊鏉?*/
.paper-slip {
    background: #fff1d6;
    border: 1px dashed #b28b5e;
    border-radius: 10px;
    padding: 10px 15px;
    margin: 10px;
    color: #3a2a1a;
    font-size: 0.95rem;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    display: inline-block;
    font-family: 'Caveat', cursive;
}

/* 绗旇鏈〉闈?*/
.notebook-page {
    background: #faf0e6;
    border-left: 4px solid #b28b5e;
    border-bottom: 1px solid #b28b5e;
    border-radius: 0 0 10px 10px;
    padding: 20px;
    margin: 20px 0;
    color: #3a2a1a;
    font-family: 'Courier New', monospace;
    box-shadow: inset 0 0 0 1px #d4a373, 0 5px 10px rgba(0,0,0,0.2);
    background-image: repeating-linear-gradient(transparent, transparent 24px, #e0b87b 25px);
    line-height: 25px;
}

/* 鐢佃剳鏄剧ず灞?*/
.screen-display {
    background: #1e2a3a;
    border: 4px solid #8b6b42;
    border-radius: 20px;
    padding: 20px;
    margin: 20px 0;
    color: #9fef9f;
    font-family: 'VT323', monospace;
    font-size: 1.2rem;
    box-shadow: inset 0 0 20px #0f0, 0 10px 20px #000;
    text-shadow: 0 0 5px #0f0;
}

        /* 鎻掔敾鍗犱綅鍖哄煙 */
        .illustration-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .placeholder {
            background: rgba(255,255,255,0.1);
            border: 2px dashed rgba(255,215,0,0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aab8d9;
            font-size: 0.9rem;
            text-align: center;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .placeholder-sm {
            width: 120px;
            height: 120px;
        }

        .placeholder-md {
            width: 160px;
            height: 160px;
        }

        .placeholder-lg {
            width: 200px;
            height: 200px;
        }

        .placeholder-xl {
            width: 250px;
            height: 180px;
        }
		
		/* 鍔ㄧ敾绫?*/
        .spin-slow {
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .sway {
            animation: sway 2s ease-in-out infinite;
        }

        @keyframes sway {
            0% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
            100% { transform: rotate(-3deg); }
        }
		
		@keyframes flipOut {
    0% { transform: rotateY(0deg) scale(1); opacity: 1; }
    50% { transform: rotateY(90deg) scale(0.9); opacity: 0.5; }
    100% { transform: rotateY(180deg) scale(0.8); opacity: 0; }
}
@keyframes flipIn {
    0% { transform: rotateY(180deg) scale(0.8); opacity: 0; }
    50% { transform: rotateY(90deg) scale(0.9); opacity: 0.5; }
    100% { transform: rotateY(0deg) scale(1); opacity: 1; }
}
.page-flip-out {
    animation: flipOut 0.6s ease forwards;
    pointer-events: none; /* 闃叉鍔ㄧ敾鏈熼棿琚偣鍑?*/
}
.page-flip-in {
    animation: flipIn 0.6s ease forwards;
}

.firework-particle {
    position: fixed;
    pointer-events: none;
    color: gold;
    font-size: 1.5rem;
    animation: explode 1.2s ease-out forwards;
    z-index: 1000;
    text-shadow: 0 0 10px orange, 0 0 20px yellow;
}
@keyframes explode {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}

        /* ===== 瑙ｈ皽鍖哄煙 ===== */
        .puzzle-area {
    background: rgba(40, 30, 20, 0.65);
	background-image: 
        radial-gradient(circle at 20% 40%, rgba(255, 210, 130, 0.25) 0%, transparent 50%),
        radial-gradient(circle at 80% 30%, rgba(255, 180, 100, 0.2) 0%, transparent 45%),
        radial-gradient(circle at 50% 70%, rgba(220, 160, 110, 0.15) 0%, transparent 60%);
    backdrop-filter: blur(8px);
    border-radius: 28px;
    padding: 25px;
    margin: 30px 0 50px;
    border: 2px solid #c9a87c;
    box-shadow: 0 0 20px #c9a87c, inset 0 0 10px #5e4b3c;
}

        .question {
            font-size: 1.2rem;
            color: #ffd966;
            margin-bottom: 20px;
            font-weight: 500;
            text-shadow: 0 0 5px #ffaa33;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 25px 0;
        }

        .option-btn {
		font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
font-weight: 600; /* 閫傚綋鍔犵矖 */
    background: rgba(60, 45, 30, 0.9);
    border: 2px solid #b28b5e;
    border-radius: 60px;
    padding: 16px 20px;
    color: #f0e6d2;
    font-size: 1.1rem;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.6), inset 0 1px 3px #ffdd99;
}
.option-btn:hover {
    background: rgba(120, 80, 50, 0.9);
    border-color: #e0b87b;
    transform: scale(1.02);
    box-shadow: 0 0 20px #e0b87b, inset 0 1px 5px #ffcc88;
}
.option-btn.selected {
    background: #b28b5e;
    border-color: #ffdd99;
    color: #1e160f;
    font-weight: bold;
    box-shadow: 0 0 30px #ffaa33, inset 0 2px 5px #fff1d6;
}

.rivet {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 12px;
    height: 12px;
    background: radial-gradient(circle at 30% 30%, #e0b87b, #5e3e2b);
    border-radius: 50%;
    border: 1px solid #b28b5e;
    box-shadow: 0 2px 4px #000;
}
.rivet.left { left: 20%; }
.rivet.right { right: 20%; }

.ticket {
    position: relative;
    background: #f7e9d7;  /* 鏃х焊鑹?*/
    padding: 25px 20px;
    margin: 20px 0;
    border: 2px dashed #8b6b42;
    border-radius: 20px 20px 20px 20px;
    box-shadow: 0 5px 0 #5e3e2b, 0 10px 20px rgba(0,0,0,0.3);
    font-family: 'Courier New', '鍗庢枃妤蜂綋', monospace;
    color: #3a2a1a;
    transform: rotate(-1deg);
    max-width: 100%;
}

/* 绌垮瓟杈圭紭 */
.ticket-hole {
    position: absolute;
    top: -5px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 20px;
    background: #b28b5e;
    border-radius: 50%;
    box-shadow: 0 0 0 3px #f7e9d7;
    z-index: 2;
}
.ticket-hole.bottom {
    top: auto;
    bottom: -5px;
}

.ticket-content {
    position: relative;
    z-index: 1;
}

.ticket-destination {
    font-size: 1.2rem;
    font-weight: bold;
    color: #5e3e2b;
    text-align: center;
    margin: 15px 0;
    font-style: italic;
}

.ticket-stub {
    text-align: right;
    font-size: 0.9rem;
    color: #8b6b42;
    border-top: 1px dotted #8b6b42;
    padding-top: 10px;
    margin-top: 10px;
}



        .input-field {
    width: 100%;
    padding: 16px 20px;
    background: rgba(30, 20, 10, 0.7);
    border: 2px solid #b28b5e;
    border-radius: 60px;
    color: #f0e6d2;
    font-size: 1.1rem;
    margin: 20px 0;
    backdrop-filter: blur(2px);
    box-shadow: inset 0 2px 5px #2a1e14;
}
.input-field:focus {
    border-color: #e0b87b;
    outline: none;
    box-shadow: 0 0 20px #e0b87b, inset 0 2px 5px #3a2a1a;
}

.input-field::placeholder {
    font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
    color: #b28b5e;
    opacity: 0.8;
}

        .submit-btn {
		font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
font-weight: 600; /* 閫傚綋鍔犵矖 */
    background: linear-gradient(145deg, #b28b5e, #8b6b42);
    color: #1e160f;
    border: none;
    border-radius: 60px;
    padding: 18px 30px;
    font-size: 1.2rem;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    box-shadow: 0 8px 0 #5e3e2b, 0 10px 20px rgba(0,0,0,0.4);
    border: 1px solid #e0b87b;
    text-transform: uppercase;
    letter-spacing: 2px;
}

function typeWriter(text, elementId, speed = 50) {
    const el = document.getElementById(elementId);

    el.innerHTML = ''; // 娓呯┖瀹瑰櫒
    let i = 0;
    const timer = setInterval(() => {

            el.innerHTML += text.charAt(i);
            i++;
        } else {
            clearInterval(timer);
            // 鍙€夛細绉婚櫎鍏夋爣
            el.classList.remove('typing-cursor');
        }
    }, speed);
    el.classList.add('typing-cursor'); // 娣诲姞鍏夋爣
}
